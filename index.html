            <span style="font-weight: 900;">𝐁𝐎𝐓 𝐅𝐑𝐄𝐄 𝐅𝐈𝐑𝐄 𝟐𝟎𝟏𝟕 ✨</span>
        </span><br>
        <div style="color: #00FF00;">
        اكتب اسمك لزخرفه<br>
        اكتب رقم <b>1</b> لحصول على اسم فارغ<br>
        اكتب رقم <b>2</b> لحصول على رموز مميزة<br>
        اكتب رقم <b>3</b> لتلوين الإسم<br>
        اكتب رقم <b>4</b> لحصول على اسماء كلانات<br>
        اكتب رقم <b>5</b> لحصول على اسماء برازيلية والعادية<br>
        اكتب رقم <b>6</b> لحصول على لوجو 🎨
        </div>`);
    };

    let isColoring = false;

    function send() {
        let val = inputField.value.trim();
        if (!val) return;
        inputField.value = "";

        if (isColoring) {
            let html = "اختر اللون للنسخ:<br>";
            const colorMap = [{n:"أحمر", f:"[FF0000]", c:"#FF0000"}, {n:"أصفر", f:"[FFFF00]", c:"#FFFF00"}, {n:"أزرق", f:"[0000FF]", c:"#0000FF"}, {n:"أخضر", f:"[00FF00]", c:"#00FF00"}, {n:"وردي", f:"[FF00FF]", c:"#FF00FF"}];
            colorMap.forEach(c => { html += `<div class="style-row" onclick="copyText('${c.f}${val}')"><span style="color:${c.c}">${val}</span></div>`; });
            botReply(html);
            isColoring = false;
            return;
        }

        if (val === "1") {
            botReply("انسخ الكود فارغ:<br><div class='style-row' onclick=\"copyText('ㅤ')\"><span>ㅤ</span></div><div class='style-row' onclick=\"copyText('ㅤㅤ')\"><span>ㅤㅤ</span></div>");
        } else if (val === "2") {
            let html = "اضغط على الرمز لنسخه:<br><div class='symbol-grid'>";
            allSymbols.forEach(sym => { if(sym.trim() !== "") html += `<div class="symbol-item" onclick="copyText('${sym}')">${sym}</div>`; });
            html += "</div>";
            botReply(html);
        } else if (val === "3") {
            botReply("أرسل الاسم الذي تريد تلوينه الآن 🎨");
            isColoring = true;
        } else if (val === "4") {
            const clans = ["ONLYㅤGOATSAㅤ??", "Only legend", "ONLYㅤGangㅤ??", "ＩＱᅠ〆 T E A M", "WOLF TENX", "ＧＳＧ〆IＲＡQ", "ᵀᵉᵃᵐ★Cobra"];
            let html = "أسماء كلانات مقترحة:<br>";
            clans.forEach(n => { html += `<div class="style-row" onclick="copyText('${n}')"><span>${n}</span></div>`; });
            botReply(html);
        } else if (val === "5") {
            const brazil = ["ＳＮＩＰＥＲ", "ɴᴇʏᴍᴀʀ", "God　CRIME　모", "sᴏᴍʙʀᴀ☂ 1%", "Zoom. 01x", "Universe NoXx", "x7ㅤGareㅤZzz"];
            let html = "أسماء برازيلية وعادية:<br>";
            brazil.forEach(n => { html += `<div class="style-row" onclick="copyText('${n}')"><span>${n}</span></div>`; });
            botReply(html);
        } else if (val === "6") {
            botReply("خدمة تصميم اللوجو ستتوفر قريباً 🎨✨");
        } else {
            let html = "أنماط الزخرفة لاسمك:<br>";
            maps.forEach(m => {
                let res = "";
                let styleArray = Array.from(m);
                for (let char of val) {
                    let idx = alpha.indexOf(char);
                    res += (idx > -1) ? (styleArray[idx] || char) : char;
                }
                html += `<div class="style-row" onclick="copyText('${res}')"><span>${res}</span></div>`;
            });
            botReply(html);
        }
    }

    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
</script>
