<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>BOT ZA5RAFA 3 </title>
    

  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange: #ff5c00;
            --text: #f0f0ff;
        }

        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Cairo', sans-serif; overflow: hidden; background: #000; 
        }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        #bg-login { 
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2b22fbe56ede9d785ebed4f12a377b91.jpg');
            background-size: cover; background-position: center; filter: brightness(0.6); 
        }

        #bg-main { 
            display: none;
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2c7002c23451f600062f42ce7e7a9815.jpg');
            background-size: cover; background-position: center;
        }

        #loader-container { text-align: center; z-index: 20; width: 80%; max-width: 350px; }
        .progress-wrapper {
            width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #ff0000, #ff7b00);
            box-shadow: 0 0 15px #ff4500; transition: width 0.1s linear;
        }
        .loading-text { color: #fff; margin-bottom: 8px; font-weight: 700; font-size: 14px; }

        .glass-panel {
            width: 240px; background: rgba(255, 255, 255, 0.12);
            border: 1.2px solid rgba(255, 255, 255, 0.4); border-radius: 25px; 
            text-align: center; padding: 25px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .login-title { color: #fff; font-size: 16px; margin-bottom: 15px; font-weight: 900; }
        
        .google-btn {
            background: #fff; width: 30px; height: 30px; border-radius: 50%; 
            border: 1.5px solid #000; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; margin: 0 auto 10px auto; 
        }
        .google-btn img { width: 16px; height: 16px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-field {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; padding: 8px; color: #fff; font-family: 'Cairo', sans-serif;
            font-size: 12px; outline: none; text-align: center;
        }
        .login-submit {
            background: linear-gradient(90deg, #ff0000, #ff7b00); border: none;
            border-radius: 8px; color: white; padding: 8px; cursor: pointer;
            font-size: 12px; font-weight: bold; font-family: 'Cairo', sans-serif;
        }

        #main-interface { display: none; width: 100%; height: 100%; position: relative; }
        
        .top-bar {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 12px; align-items: center; z-index: 10;
        }

        .action-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.2); border: 2px solid #fff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            overflow: hidden; backdrop-filter: blur(5px);
        }
        .action-btn img { width: 70%; height: 70%; object-fit: contain; }

        #decoration-ui {
            display: none; position: fixed; inset: 0; 
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/0f77bc3b090c6d61e6793f96e92d25e7.jpg');
            background-size: cover; background-position: center;
            z-index: 100; flex-direction: column; padding: 15px;
        }
        
        #decoration-ui::before {
            content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: -1;
        }

        .close-ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; cursor: pointer; z-index: 110; text-shadow: 0 0 10px #000; }

        #decor-results {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            gap: 6px; margin-top: 50px; padding-bottom: 70px; width: 100%; max-width: 320px; align-self: center;
        }

        /* تعديلات تصغير أزرار الأسماء لتبدو أصغر في الصورة */
        .decor-item {
            background: rgba(0, 0, 0, 0.65); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px; border-radius: 8px; color: #fff; 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; cursor: pointer; transition: 0.2s; backdrop-filter: blur(5px);
            width: 80%; align-self: center; /* تقليل العرض لـ 80% */
            margin: 2px 0;
        }
        .decor-item:active { transform: scale(0.98); background: rgba(255, 92, 0, 0.7); }
        
        .copy-icon {
            width: 14px; height: 14px; opacity: 0.8; filter: invert(1);
        }

        /* تصغير حقل الإدخال السفلي */
        .bottom-input-container {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 70%; max-width: 240px; background: rgba(0, 0, 0, 0.8);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 10px; display: flex; align-items: center; backdrop-filter: blur(5px);
        }
        .bottom-input-container input {
            background: transparent; border: none; color: #fff; width: 100%;
            outline: none; font-family: 'Cairo', sans-serif; font-size: 11px; text-align: center;
        }

        #account-modal {
            display: none; position: fixed; top: 75px; right: 20px; 
            background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px; padding: 15px; width: 200px;
            color: #fff; z-index: 110; text-align: right; backdrop-filter: blur(10px);
        }
        .modal-info { font-size: 13px; margin-bottom: 5px; word-wrap: break-word; }
        .like-section { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; text-align: center; margin-top: 10px;}
        
        #decor-results::-webkit-scrollbar { width: 3px; }
        #decor-results::-webkit-scrollbar-thumb { background: #ff7b00; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="bg-login" class="bg-layer"></div>
    <div id="bg-main" class="bg-layer"></div>

    <div id="loader-container">
        <div class="loading-text">جاري التحميل... <span id="percentage">0%</span></div>
        <div class="progress-wrapper" onclick="speedUp()">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="login-interface" class="glass-panel" style="display: none;">
        <div class="login-title">تسجيل الدخول</div>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://cdn-icons-png.flaticon.com/128/300/300221.png" alt="google">
        </button>
        <div class="input-group" style="margin-top: 15px;">
            <input type="text" class="input-field" placeholder="اسم المستخدم" id="username">
            <input type="password" class="input-field" placeholder="كلمة المرور" id="password">
            <button class="login-submit" onclick="manualLogin()">دخول</button>
        </div>
    </div>

    <div id="main-interface">
        <div class="top-bar">
            <button class="action-btn" onclick="toggleDecorUI()">
                <img src="https://images.icon-icons.com/3399/PNG/96/bot_icon_214984.png" alt="bot">
            </button>
            <button class="action-btn" onclick="toggleModal()">
                <img src="https://cdn-icons-png.flaticon.com/128/10628/10628876.png" id="userAvatar" alt="user">
            </button>
        </div>

        <div id="decoration-ui">
            <span class="close-ui" onclick="toggleDecorUI()">✕</span>
            <div id="decor-results"></div>
            <div class="bottom-input-container">
                <input type="text" id="decorInput" placeholder="اكتب اسمك..." oninput="generateDecor()">
            </div>
        </div>

        <div id="account-modal">
            <div id="displayName" class="modal-info">---</div>
            <div id="displayEmail" class="modal-info" style="font-size: 10px; color: #aaa;">---</div>
            <div class="like-section">
                <div onclick="addLike()" style="cursor: pointer;">
                    <img src="https://cdn-icons-png.flaticon.com/128/12096/12096301.png" style="width: 30px;" alt="Like">
                    <div id="totalLikes" style="font-size: 11px; color: #ff7b00;">تحميل...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8FB2radBFN7NVC4JUX_JAjUk93glXfDo",
            authDomain: "bot-za5rafa.firebaseapp.com",
            databaseURL: "https://bot-za5rafa-default-rtdb.firebaseio.com",
            projectId: "bot-za5rafa",
            storageBucket: "bot-za5rafa.firebasestorage.app",
            messagingSenderId: "747795672156",
            appId: "1:747795672156:web:938283330b06a7b0f6ca99"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();
        const likesRef = ref(database, 'globalLikes');

        onValue(likesRef, (s) => {
            const count = s.val() || 0;
            document.getElementById('totalLikes').innerText = count + " إعجاب";
        });

        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).then((r) => {
                showMain(r.user.displayName, r.user.email, r.user.photoURL);
            });
        }

        window.manualLogin = function() {
            const u = document.getElementById('username').value;
            if(u) showMain(u, "تسجيل يدوي", null);
        }

        function showMain(name, email, photo) {
            document.getElementById('login-interface').style.display = 'none';
            document.getElementById('bg-login').style.display = 'none';
            document.getElementById('bg-main').style.display = 'block';
            document.getElementById('main-interface').style.display = 'block';
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayEmail').innerText = email;
            if(photo) document.getElementById('userAvatar').src = photo;
        }

        window.toggleModal = function() {
            const m = document.getElementById('account-modal');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        window.toggleDecorUI = function() {
            const ui = document.getElementById('decoration-ui');
            ui.style.display = (ui.style.display === 'flex') ? 'none' : 'flex';
        }

        const charMaps = {
            boldS: {a:"𝐀",b:"𝐁",c:"𝐂",d:"𝐃",e:"𝐄",f:"𝐅",g:"𝐆",h:"𝐇",i:"𝐈",j:"𝐉",k:"𝐊",l:"𝐋",m:"𝐌",n:"𝐍",o:"𝐎",p:"𝐏",q:"𝐐",r:"𝐑",s:"𝐒",t:"𝐓",u:"𝐔",v:"𝐕",w:"𝐖",x:"𝐗",y:"𝐘",z:"𝐉"},
            boldSans: {a:"𝗔",b:"𝗕",c:"𝗖",d:"𝗗",e:"𝗘",f:"𝗙",g:"𝗚",h:"𝗛",i:"𝗜",j:"𝗝",k:"𝗞",l:"𝗟",m:"𝗠",n:"𝗡",o:"𝗢",p:"𝗣",q:"𝗤",r:"𝗥",s:"𝗦",t:"𝗧",u:"𝗨",v:"𝗩",w:"𝗪",x:"𝗫",y:"𝗬",z:"𝗭"},
            italicS: {a:"𝑨",b:"𝑩",c:"𝑪",d:"𝑫",e:"𝑬",f:"𝑭",g:"𝑮",h:"𝑯",i:"𝑰",j:"𝑱",k:"𝑲",l:"𝑳",m:"𝑴",n:"𝑵",o:"𝑶",p:"𝑷",q:"𝑸",r:"𝑹",s:"𝑺",t:"𝑻",u:"𝑼",v:"𝑽",w:"𝑾",x:"𝑿",y:"𝒀",z:"𝒁"},
            circles: {a:"Ⓐ",b:"Ⓑ",c:"Ⓒ",d:"Ⓓ",e:"Ⓔ",f:"Ⓕ",g:"Ⓖ",h:"Ⓗ",i:"Ⓘ",j:"Ⓙ",k:"Ⓚ",l:"Ⓛ",m:"Ⓜ",n:"Ⓝ",o:"Ⓞ",p:"Ⓟ",q:"Ⓠ",r:"Ⓡ",s:"Ⓢ",t:"Ⓣ",u:"Ⓤ",v:"Ⓥ",w:"Ⓦ",x:"Ⓧ",y:"Ⓨ",z:"Ⓩ"},
            circlesF: {a:"🅐",b:"🅑",c:"🅒",d:"🅓",e:"🅔",f:"🅕",g:"🅖",h:"🅗",i:"🅘",j:"🅙",k:"🅚",l:"🅛",m:"🅜",n:"🅝",o:"🅞",p:"🅟",q:"🅠",r:"🅡",s:"🅢",t:"🅣",u:"🅤",v:"🅥",w:"🅦",x:"🅧",y:"🅨",z:"🅩"},
            double: {a:"𝔸",b:"𝔹",c:"ℂ",d:"𝔻",e:"𝔼",f:"𝔽",g:"𝔾",h:"ℍ",i:"𝕀",j:"𝕁",k:"𝕂",l:"𝕃",m:"𝕄",n:"ℕ",o:"𝕆",p:"ℙ",q:"ℚ",r:"ℝ",s:"𝕊",t:"𝕋",u:"𝕌",v:"𝕍",w:"𝕎",x:"𝕏",y:"𝕐",z:"ℤ"},
            fraktur: {a:"𝔄",b:"𝔅",c:"ℭ",d:"𝔇",e:"𝔈",f:"𝔉",g:"𝔊",h:"ℌ",i:"ℑ",j:"𝔍",k:"𝔎",l:"𝔏",m:"𝔐",n:"𝔑",o:"𝔒",p:"𝔓",q:"𝔔",r:"ℜ",s:"𝔖",t:"𝔗",u:"𝔘",v:"𝔙",w:"𝔚",x:"𝔛",y:"𝔜",z:"ℨ"},
            mono: {a:"𝙰",b:"𝙱",c:"𝙲",d:"𝙳",e:"𝙴",f:"𝙵",g:"𝙶",h:"𝙷",i:"𝙸",j:"𝙹",k:"𝙺",l:"𝙻",m:"𝙼",n:"𝙽",o:"𝙾",p:"𝙿",q:"𝚀",r:"𝚁",s:"𝚂",t:"𝚃",u:"𝚄",v:"𝑽",w:"𝚆",x:"𝚇",y:"𝚈",z:"𝚉"},
            sq: {a:"🄰",b:"🄱",c:"🄲",d:"🄳",e:"🄴",f:"🄵",g:"🄶",h:"🄷",i:"🄸",j:"🄹",k:"🄺",l:"🄻",m:"🄼",n:"🄽",o:"🄾",p:"🄿",q:"🅀",r:"🅁",s:"🅂",t:"🅃",u:"🅄",v:"🅅",w:"🅆",x:"🅇",y:"🅈",z:"🅉"}
        };

        window.generateDecor = function() {
            const input = document.getElementById('decorInput').value;
            const res = document.getElementById('decor-results');
            res.innerHTML = '';
            if(!input) return;

            Object.values(charMaps).forEach(map => {
                const text = input.toLowerCase().split('').map(c => map[c] || c).join('').toUpperCase();
                const div = document.createElement('div');
                div.className = 'decor-item';
                div.innerHTML = `
                    <span>${text}</span>
                    <img src="https://images.icon-icons.com/935/PNG/96/copy-two-paper-sheets-interface-symbol_icon-icons.com_73283.png" class="copy-icon">
                `;
                div.onclick = () => { navigator.clipboard.writeText(text); alert("تم نسخ: " + text); };
                res.appendChild(div);
            });
        }
    </script>

    <script>
        let p = 0;
        let t = setInterval(() => {
            if (p >= 100) {
                clearInterval(t);
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('login-interface').style.display = 'block';
            } else {
                p++;
                document.getElementById('progress-fill').style.width = p + '%';
                document.getElementById('percentage').innerText = p + '%';
            }
        }, 20);
        function speedUp() { p = Math.min(100, p + 25); }
    </script>
</body>
</html>
    
  </body>
  
  </html>
