  else {
    botReply(`يرجى اختيار الرقم 1 للحساسية، 2 للأسماء البرازيلية، 3 للأسماء المميزة، أو 4 للرموز ✨.`);
  }
  inp.value = "";
}

function getSens(name) {
    const d = DEVICES_DATA[name];
    const html = `
        إعدادات الحساسية لـ <b>${name}</b> ✨:
        <div class="video-header-player">
            <div class="video-overlay"></div> 
            <video id="activeVideo" autoplay loop playsinline> 
                <source src="${VIDEO_URL}" type="video/mp4">
            </video>
        </div>
        <div class="sens-box">
            <div class="sens-line"><span>عام:</span> <b>${d.gen}</b></div>
            <div class="sens-line"><span>نقطة حمراء:</span> <b>${d.red}</b></div>
            <div class="sens-line"><span>عدسة 2x:</span> <b>${d.x2}</b></div>
            <div class="sens-line"><span>عدسة 4x:</span> <b>${d.x4}</b></div>
            <div class="sens-line"><span>القناص:</span> <b>${d.snp}</b></div>
            <div class="sens-line" style="color:var(--orange)"><span>زر النار:</span> <b>${d.fire}</b></div>
        </div>
    `;
    botReply(html, true);
    
    setTimeout(() => {
        const vid = document.getElementById('activeVideo');
        if (vid) {
            vid.muted = false;
            vid.volume = 1.0;
            vid.play().catch(() => {
                console.log("صوت الفيديو يتطلب ضغطة أولى على الشاشة.");
            });
        }
    }, 100);
}

document.addEventListener('click', () => {
    const vid = document.getElementById('activeVideo');
    if (vid && vid.muted) {
        vid.muted = false;
        vid.play();
    }
}, { once: false });

window.onload = showWelcome;
</script>
