<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>SVG Lamp & Login Interface - BOT ZA5RAFA</title>
    
    <link rel="manifest" href="https://progressier.app/WEAtlx3d0EIy2AGKXbS9/progressier.json"/>
    <script defer src="https://progressier.app/WEAtlx3d0EIy2AGKXbS9/script.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات التنسيق العام */
        *, *:before, *:after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-image: url('https://s-media-cache-ak0.pinimg.com/736x/89/ed/e5/89ede56bcc8243787e55676ab28f287f.jpg');
            background-size: 350px 250px;
        }

        .bg-img {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: black;
            opacity: 0.9;
            transition: opacity 0.3s ease-out;
            z-index: 0;
        }

        .lamp-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 40px; 
        }

        .l {
            background-color: rgba(0,0,0,0.7);
            border-radius: 0.75em;
            box-shadow: 0.125em 0.125em 0 0.125em rgba(0,0,0,0.3) inset;
            color: #fdea7b;
            display: inline-flex;
            align-items: center;
            padding: 0.15em;
            width: 3em;
            height: 1.5em;
            transition: background-color 0.1s 0.3s ease-out, box-shadow 0.1s 0.3s ease-out;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        .l:before {
            content: "";
            background-color: #d7d7d7;
            border-radius: 50%;
            width: 1.2em;
            height: 1.2em;
            transition: background-color 0.1s 0.3s ease-out, transform 0.3s ease-out;
            z-index: 1;
        }

        .l:after {
            content: "";
            background:
                linear-gradient(transparent 50%, rgba(0,0,0,0.15) 0) 0 50% / 50% 100%,
                repeating-linear-gradient(90deg,#bbb 0,#bbb,#bbb 20%,#999 20%,#999 40%) 0 50% / 50% 100%,
                radial-gradient(circle at 50% 50%,#888 25%, transparent 26%);
            background-repeat: no-repeat;
            border: 0.25em solid transparent;
            border-left: 0.4em solid #d8d8d8;
            transition: border-left-color 0.1s 0.3s ease-out, transform 0.3s ease-out;
            transform: translateX(-22.5%);
            transform-origin: 25% 50%;
            width: 1.2em;
            height: 1em;
        }

        .l:checked {
            background-color: rgba(0,0,0,0.45);
            box-shadow: 0.125em 0.125em 0 0.125em rgba(0,0,0,0.1) inset;
        }

        .l:checked:before {
            background-color: currentColor;
            transform: translateX(125%);
        }

        .l:checked:after {
            border-left-color: currentColor;
            transform: translateX(-2.5%) rotateY(180deg);
        }

        form {
            width: 290px; 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; 
            padding: 30px 25px;  
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 50px; 
            box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.9);
            border: 1px solid red;
            animation: borderRotate 2s linear infinite;
        }

        @keyframes borderRotate {
            0% { border-color: red; }
            25% { border-color: blue; }
            50% { border-color: green; }
            75% { border-color: yellow; }
            100% { border-color: red; }
        }

        .settings-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 25px;
            height: 25px;
            color: #ff3333; 
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 5;
            animation: spin 0.4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .img-container {
            position: relative;
            width: 85px; 
            height: 85px; 
            margin: 0 auto 15px auto;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 50%;
        }

        label {
            display: block;
            margin-top: 12px;
            font-size: 13px; 
            font-weight: 500;
            color: #ffffff;
            text-align: left;
        }

        input[type="text"], input[type="password"] {
            display: block;
            height: 40px; 
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05); 
            border-radius: 10px;
            padding: 0 12px;
            margin-top: 5px;
            font-size: 12px; 
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button.login-btn {
            margin-top: 20px;
            width: 100%;
            background-color: #ffffff;
            color: #000;
            padding: 10px 0;
            font-size: 14px; 
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .social {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        .social .go {
            width: 100%; 
            border-radius: 8px;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 12px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .shard {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 100;
            animation: fall-and-fade 8s forwards ease-in;
        }

        @keyframes fall-and-fade {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), 800px) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class='bg-img' id="roomOverlay"></div>

    <div class="lamp-container">
        <input class="l" type="checkbox" id="lightSwitch" onchange="toggleLight(this)">
    </div>

    <form id="loginForm">
        <div class="settings-btn"><i class="fas fa-cog"></i></div>

        <div class="img-container" onclick="breakGlass(this)">
            <img src="https://res.cloudinary.com/dpggetoyh/image/upload/v1777280345/Picsart_26-04-27_09-53-07-249_ipw3iw.png" alt="Logo" class="form-logo">
        </div>

        <label for="username">Username</label>
        <input type="text" placeholder="Email or Phone" id="username" required>

        <label for="password">Password</label>
        <input type="password" placeholder="Password" id="password" required>

        <button type="submit" class="login-btn">Log In</button>
        <div class="social">
            <div class="go" id="googleBtn"><i class="fab fa-google"></i> Login with Google</div>
        </div>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD8FB2radBFN7NVC4JUX_JAjUk93glXfDo",
          authDomain: "bot-za5rafa.firebaseapp.com",
          databaseURL: "https://bot-za5rafa-default-rtdb.firebaseio.com",
          projectId: "bot-za5rafa",
          storageBucket: "bot-za5rafa.firebasestorage.app",
          messagingSenderId: "747795672156",
          appId: "1:747795672156:web:938283330b06a7b0f6ca99"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const targetUrl = "https://abdelahidz1-hash.github.io/bot_zakrafa/";

        // تسجيل الدخول بجوجل
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                console.log("Success:", result.user.displayName);
                window.location.href = targetUrl;
            } catch (error) {
                console.error("Error:", error.message);
                alert("Login Error: " + error.message);
            }
        };

        // تسجيل الدخول اليدوي
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = targetUrl;
        };
    </script>

    <script>
        function toggleLight(checkbox) {
            const room = document.getElementById('roomOverlay');
            room.style.opacity = checkbox.checked ? "0.2" : "0.9";
        }

        function breakGlass(container) {
            const breakSound = new Audio('https://res.cloudinary.com/dpggetoyh/video/upload/VID_20260428_213549_853_rwlfop.mp4');
            breakSound.play().catch(() => console.log("Sound play deferred"));

            for (let i = 0; i < 25; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                const size = Math.random() * 10 + 3; 
                shard.style.width = size + 'px';
                shard.style.height = size + 'px';
                const rect = container.getBoundingClientRect();
                shard.style.left = (rect.left + Math.random() * rect.width) + 'px';
                shard.style.top = (rect.top + Math.random() * rect.height) + 'px';
                const destinationX = (Math.random() - 0.5) * 400;
                shard.style.setProperty('--x', destinationX + 'px');
                shard.style.setProperty('--r', (Math.random() * 720) + 'deg');
                shard.style.clipPath = `polygon(${Math.random()*100}% ${Math.random()*100}%, ${Math.random()*100}% ${Math.random()*100}%, ${Math.random()*100}% ${Math.random()*100}%)`;
                document.body.appendChild(shard);
                setTimeout(() => shard.remove(), 8000);
            }
        }
    </script>
</body>
</html>
